language: 'go'
layer: 'library'
stack: 'backend'
tags:
  - 'auth'
  - 'library'

project:
  title: 'authkit'
  description: 'Go authentication and authorization library for Web API services.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

toolchains:
  default: 'go'

workspace:
  inheritedTasks:
    include: []

fileGroups:
  go:
    - '**/*.go'
    - 'go.mod'
    - '**/*.sql'
  lintConfig:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'
  releaseConfig:
    - '.github/workflows/release-please.yml'
    - '.github/repository-settings.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'

tasks:
  build:
    command: 'go build ./...'
    toolchains: ['go']
    inputs:
      - '@group(go)'
    options:
      cache: false

  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(go)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(go)'
      - '@group(lintConfig)'
    options:
      cache: false

  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(go)'
    options:
      cache: false

  integration:
    command: 'go test -count 1 -tags integration ./store/postgres ./testkit/internal/store/postgres ./testkit/internal/authflow'
    toolchains: ['go']
    inputs:
      - '@group(go)'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'root:integration'
    inputs:
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
