language: 'typescript'
layer: 'application'
stack: 'frontend'
tags:
  - 'docs'
  - 'docusaurus'

project:
  title: 'authkit docs'
  description: 'Docusaurus documentation site for authkit.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

toolchains:
  default: 'node'

fileGroups:
  configs:
    - 'docusaurus.config.ts'
    - 'tsconfig.json'
    - 'package.json'
    - 'package-lock.json'
  sources:
    - 'docs/**/*'
    - 'src/**/*'
    - 'static/**/*'

tasks:
  clear:
    command: 'npm run clear'
    toolchains: ['javascript', 'node', 'npm']
    options:
      runInCI: false
  deploy:
    command: 'npm run deploy'
    toolchains: ['javascript', 'node', 'npm']
    options:
      runInCI: false
  docusaurus:
    command: 'npm run docusaurus'
    toolchains: ['javascript', 'node', 'npm']
    options:
      runInCI: false
  swizzle:
    command: 'npm run swizzle'
    toolchains: ['javascript', 'node', 'npm']
    options:
      runInCI: false
  write-heading-ids:
    command: 'npm run write-heading-ids'
    toolchains: ['javascript', 'node', 'npm']
    options:
      runInCI: false
  write-translations:
    command: 'npm run write-translations'
    toolchains: ['javascript', 'node', 'npm']
    options:
      runInCI: false
